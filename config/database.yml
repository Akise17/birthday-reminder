default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: birthday-reminder-dev
  host: localhost
  username: dev
  password: 1234
  port: 6543

test:
  <<: *default
  database: birthday_reminder_test

production:
  <<: *default
  database: birthday_reminder_production
  username: birthday_reminder
  password: <%= ENV["BIRTHDAY_REMINDER_DATABASE_PASSWORD"] %>
